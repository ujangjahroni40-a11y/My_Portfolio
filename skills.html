    <script>
      const mobileMenu = document.getElementById("mobile-menu");
      const nav = document.querySelector("nav");
      if (mobileMenu) {
        mobileMenu.addEventListener("click", () => {
          nav.classList.toggle("active");
        });
      }
    </script>

    <script>
      // Smooth page transition for skills page
      document.addEventListener('DOMContentLoaded', () => {
        const main = document.querySelector('section') || document.body;
        main.classList.add('page-enter');
        const navLinks = Array.from(document.querySelectorAll('header nav a'));
        function safeNavigate(href, anchor) {
          try {
            const url = new URL(href, location.href);
            if (url.origin !== location.origin) { location.href = href; return; }
            if (url.pathname === location.pathname && url.search === location.search) { location.href = href; return; }
          } catch (e) {}
          anchor.classList.add('nav-clicked');
          document.documentElement.classList.add('is-transitioning');
          main.classList.add('page-exit');
          document.body.style.pointerEvents = 'none';
          const onEnd = (ev) => { if (ev.target !== main) return; cleanup(); location.href = href; };
          const cleanup = () => { main.removeEventListener('animationend', onEnd); document.body.style.pointerEvents = ''; };
          main.addEventListener('animationend', onEnd);
          setTimeout(() => { if (document.body.style.pointerEvents === '') return; cleanup(); location.href = href; }, 900);
        }
        navLinks.forEach((a) => {
          a.addEventListener('click', (e) => {
            const href = a.getAttribute('href');
            if (!href || href.startsWith('#')) return;
            e.preventDefault();
            safeNavigate(href, a);
          });
        });
      });
    </script>
  </body>
</html>
